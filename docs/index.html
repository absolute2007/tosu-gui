<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tosu GUI</title>
    <meta
      name="description"
      content="Desktop GUI for tosu — osu! memory reader with counters, overlay, maps browser, and settings."
    />
    <link rel="icon" href="assets/icon.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="brand">
          <img class="brand-icon" src="assets/icon.svg" width="36" height="36" alt="" />
          <h1 class="brand-name">tosu GUI</h1>
        </div>
        <div class="header-actions">
          <div class="lang-switch" role="group" aria-label="Language">
            <button type="button" class="lang-btn" data-lang="ru" aria-pressed="true">RU</button>
            <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
          </div>
          <a
            class="header-link"
            href="https://github.com/absolute2007/tosu-gui"
            rel="noopener noreferrer"
          >
            GitHub
          </a>
        </div>
      </header>

      <p class="lead" data-i18n="lead"></p>

      <section class="download" aria-labelledby="download-heading">
        <h2 id="download-heading" class="sr-only" data-i18n="download">Скачать</h2>
        <div class="download-row">
          <label class="version-label" for="version">
            <span data-i18n="version">Версия</span>
            <select id="version" disabled>
              <option value="">…</option>
            </select>
          </label>
          <a id="download-setup" class="btn btn-primary" href="#" aria-disabled="true">
            Setup (.exe)
          </a>
          <a id="download-zip" class="btn btn-ghost" href="#" aria-disabled="true">ZIP</a>
        </div>
        <p id="download-meta" class="download-meta" data-i18n="loading">Загрузка списка релизов…</p>
        <p class="download-note">Windows 10/11 · x64</p>
      </section>

      <section class="shots" aria-label="Screenshots">
        <figure class="shot shot-main">
          <img
            src="assets/screenshots/Main.png"
            alt=""
            width="1464"
            height="935"
            loading="eager"
          />
        </figure>
        <div class="shot-pair">
          <figure class="shot shot-overlay">
            <img
              src="assets/screenshots/Overlay.png"
              alt=""
              width="1184"
              height="1117"
              loading="lazy"
            />
          </figure>
          <figure class="shot shot-maps">
            <img
              src="assets/screenshots/Maps.png"
              alt=""
              width="640"
              height="894"
              decoding="async"
              loading="lazy"
            />
          </figure>
        </div>
      </section>

      <footer class="footer">
        <a
          href="https://github.com/absolute2007/tosu-gui/releases"
          rel="noopener noreferrer"
          data-i18n="allReleases"
          >Все релизы</a
        >
        <span class="sep">·</span>
        <a href="https://github.com/tosuapp/tosu" rel="noopener noreferrer">tosu</a>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
